services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: FrontEASE
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - fop-imt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FrontEASE"]
      interval: 3s
      retries: 5
      timeout: 2s

  dotnet-server:
    build:
      context: .
      dockerfile: prod.server.Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fop-imt-network
    environment:
      - SEED_DB=${SEED_DB:-false}
  
  dotnet-client:
    build:
      context: .
      dockerfile: prod.client.Dockerfile
    volumes:
      - images_data:/app/src/FrontEASE.Client/wwwroot/resources/images
    ports:
      - "5235:5235"
    networks:
      - fop-imt-network

  tunnel:
    image: alpine:3.20
    restart: unless-stopped
    volumes:
      - ./secrets/ease_jan_priv:/run/ssh_key:ro
    environment:
      SSH_TARGET: ${SSH_TARGET}
      LOCAL_PORT: ${LOCAL_PORT}
      REMOTE_HOST: ${REMOTE_HOST}
      REMOTE_PORT: ${REMOTE_PORT}
    command:
      - sh
      - -lc
      - >
        apk add --no-cache openssh-client &&
        mkdir -p /root/.ssh &&
        cp /run/ssh_key /root/.ssh/id_key &&
        chmod 600 /root/.ssh/id_key &&
        exec ssh -N -i /root/.ssh/id_key -o IdentitiesOnly=yes -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=accept-new -L "0.0.0.0:${LOCAL_PORT}:${REMOTE_HOST}:${REMOTE_PORT}" "${SSH_TARGET}"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:10000/health >/dev/null 2>&1 || exit 1" ]
      interval: 5s
      timeout: 2s
      retries: 20
    networks:
      - fop-imt-network

  backend-core:
    build:
      context: ./src/FoP_IMT.Core
      dockerfile: Dockerfile
    volumes:
      - ./src/FoP_IMT.Core:/app
    ports:
      - "8086:8086"
    networks:
      - fop-imt-network
    depends_on:
      tunnel:
        condition: service_healthy
    environment:
      - EASE_API_BASE_URL=http://tunnel:10000

volumes:
  postgres_data:
  images_data:

networks:
  fop-imt-network:
    driver: bridge